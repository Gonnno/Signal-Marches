<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Marchés · v3</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#13131f;--bg2:#1a1a2e;--sur:#1f1f35;--sur2:#252540;--sur3:#2d2d50;
  --brd:rgba(255,255,255,0.09);--brd2:rgba(255,255,255,0.15);
  --tx:#e8e8f5;--tx2:#8888b0;--tx3:#4a4a70;
  --gr:#39d98a;--gr-dim:rgba(57,217,138,0.12);
  --rd:#f0657a;--rd-dim:rgba(240,101,122,0.12);
  --am:#f5a623;--am-dim:rgba(245,166,35,0.12);
  --ac:#7c6dfa;--ac2:#a99ff7;--ac-dim:rgba(124,109,250,0.15);
  --cyan:#2dd4bf;
  --sb:220px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Space Grotesk',sans-serif;min-height:100vh;font-size:15px;}
a{color:inherit;text-decoration:none;}

/* ── Layout ── */
.app{display:flex;min-height:100vh;}
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0;}

/* ── Status dot (réutilisé dans topbar) ── */
.sb-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--tx3);margin-right:5px;vertical-align:middle;flex-shrink:0;}
.sb-dot.live{background:var(--gr);box-shadow:0 0 6px var(--gr);}
.sb-stxt{font:400 11px/1 'IBM Plex Mono',monospace;color:var(--tx2);}

/* ── Topbar ── */
.topbar{background:var(--bg2);border-bottom:1px solid var(--brd);padding:.55rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.6rem;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.topbar-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.topbar-brand{font:700 14px/1 'Space Grotesk',sans-serif;letter-spacing:.02em;white-space:nowrap;}
.topbar-sep{color:var(--tx3);font-size:14px;}
.topbar-status{display:flex;align-items:center;}
.topbar-time{font:400 11px/1 'IBM Plex Mono',monospace;color:var(--tx3);white-space:nowrap;}
.topbar-refresh{background:var(--sur);border:1px solid var(--brd);color:var(--tx2);font:400 11px/1 'IBM Plex Mono',monospace;border-radius:6px;padding:5px 8px;cursor:pointer;}
.topbar-refresh:focus{outline:none;border-color:var(--ac);}

/* ── Topbar nav links (PC) ── */
.tb-nav-item{background:none;border:none;color:var(--tx2);font:500 13px/1 'Space Grotesk',sans-serif;cursor:pointer;padding:.35rem .65rem;border-radius:6px;transition:background .15s,color .15s;white-space:nowrap;}
.tb-nav-item:hover{background:var(--sur);color:var(--tx);}
.tb-nav-item.active{background:var(--sur);color:var(--ac2);}

.btn-analyze{padding:.45rem 1rem;background:var(--ac);color:#fff;border:none;border-radius:7px;font:600 13px/1 'Space Grotesk',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;flex-shrink:0;}
.btn-analyze:hover{background:var(--ac2);color:#0d0d14;}
.btn-analyze:disabled{opacity:.4;cursor:not-allowed;}

/* ── Content ── */
.content{padding:1.2rem 1.5rem;flex:1;}
.page{display:none;}
.page.active{display:block;}
.page-inner{max-width:820px;margin:0 auto;}

/* ── Market cards ── */
.mkt-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:1rem;}

/* ── Loading ── */
.ldr-wrap{margin-bottom:1rem;background:var(--sur);border-radius:10px;padding:.9rem 1rem;}
.ldr-bar{height:3px;background:var(--sur3);border-radius:2px;overflow:hidden;margin-bottom:.5rem;}
.ldr-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--cyan));border-radius:2px;width:0;transition:width .4s ease;}
.ldr-txt{font:400 13px/1 'IBM Plex Mono',monospace;color:var(--tx2);}

/* ── Fear & Greed ── */
.fg-widget{background:var(--sur);border:1px solid var(--brd);border-radius:12px;padding:1rem;margin-bottom:1rem;display:grid;grid-template-columns:86px 1fr;gap:1rem;align-items:center;}
.fg-gauge{width:86px;height:56px;}
.fg-gauge svg{width:100%;height:100%;}
.fg-label{font:700 14px/1 'Space Grotesk',sans-serif;margin-bottom:.3rem;}
.fg-desc{font:400 12px/1.6 'IBM Plex Mono',monospace;color:var(--tx2);}

/* ── Vedette ── */
.vedette{background:linear-gradient(135deg,rgba(124,109,250,.13),rgba(57,217,138,.06));border:1px solid rgba(124,109,250,.28);border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem;position:relative;overflow:hidden;}
.vedette::after{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(124,109,250,.1),transparent 70%);pointer-events:none;}
.vedette-eyebrow{font:400 11px/1 'IBM Plex Mono',monospace;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5rem;}
.vedette-eyebrow::before{content:'★ ';color:var(--am);}
.vedette-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.8rem;}
.vedette-name{font:700 18px/1.1 'Space Grotesk',sans-serif;margin-bottom:.4rem;}
.vedette-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:.5rem;}
.vedette-badge{font:500 11px/1 'IBM Plex Mono',monospace;padding:3px 7px;border-radius:4px;background:rgba(255,255,255,.06);color:var(--tx2);}
.vedette-score{text-align:right;flex-shrink:0;}
.vedette-score-num{font:700 40px/1 'IBM Plex Mono',monospace;}
.vedette-score-sub{font:400 11px/1 'IBM Plex Mono',monospace;color:var(--tx3);margin-top:3px;}
.vedette-actifs{display:flex;flex-wrap:wrap;gap:4px;margin-top:.7rem;padding-top:.7rem;border-top:1px solid rgba(255,255,255,.06);}
.vedette-actif{font:500 12px/1 'IBM Plex Mono',monospace;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.05);}

/* ── Market card ── */
.mc{background:var(--sur);border:1px solid var(--brd);border-radius:11px;overflow:hidden;cursor:pointer;transition:border-color .2s;}
.mc:hover,.mc.open{border-color:var(--brd2);}
.mc.star{border-color:rgba(124,109,250,.32);background:linear-gradient(180deg,var(--sur),rgba(124,109,250,.04));}
.mc-head{display:grid;grid-template-columns:50px 1fr auto;align-items:center;gap:8px;padding:.7rem .85rem;}
.mc-status{display:flex;flex-direction:column;align-items:center;gap:3px;}
.mc-dot{width:7px;height:7px;border-radius:50%;}
.mc-dot.on{background:var(--gr);box-shadow:0 0 5px var(--gr);}
.mc-dot.off{background:var(--tx3);}
.mc-dlabel{font:600 10px/1 'IBM Plex Mono',monospace;letter-spacing:.04em;}
.mc-dlabel.on{color:var(--gr);}
.mc-dlabel.off{color:var(--tx3);}
.mc-hor{font:400 10px/1.3 'IBM Plex Mono',monospace;color:var(--tx3);text-align:center;margin-top:1px;}
.mc-label{font:600 13px/1.2 'Space Grotesk',sans-serif;color:var(--tx2);display:flex;align-items:center;gap:5px;}
.mc-star-tag{font:600 11px/1 'IBM Plex Mono',monospace;color:var(--am);}
.mc-sig{font:700 16px/1 'Space Grotesk',sans-serif;margin-top:3px;}
.mc-sub{font:400 13px/1 'IBM Plex Mono',monospace;color:var(--tx3);margin-top:3px;}
.mc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.mc-arrow{font-size:11px;color:var(--tx3);transition:transform .25s;}
.mc.open .mc-arrow{transform:rotate(180deg);}
.mc-quotes-strip{display:flex;flex-wrap:wrap;gap:4px;padding:0 .85rem .55rem;border-bottom:1px solid var(--brd);}
.mc-q{font:400 11px/1 'IBM Plex Mono',monospace;padding:2px 6px;border-radius:3px;background:var(--sur2);}
.mc-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.mc.open .mc-body{max-height:2000px;}
.mc-body-inner{padding:.85rem;}

/* ── Sparkline ── */
.spark-hdr{font:500 12px/1 'IBM Plex Mono',monospace;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;padding-bottom:5px;border-bottom:1px solid var(--brd);display:grid;grid-template-columns:1fr 50px 50px 50px 72px;gap:3px;margin-bottom:2px;}
.spark-hdr span{text-align:right;}
.spark-hdr span:first-child{text-align:left;}
.spark-row{display:grid;grid-template-columns:1fr 50px 50px 50px 72px;gap:3px;align-items:center;font:400 12px/1 'IBM Plex Mono',monospace;color:var(--tx2);padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.spark-row:last-child{border-bottom:none;}
.spark-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.spark-val{text-align:right;}
.spark-svg{height:24px;width:70px;}
.card2{background:var(--sur2);border-radius:9px;padding:.75rem .85rem;margin-bottom:.6rem;}
.card2-title{font:500 11px/1 'IBM Plex Mono',monospace;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem;}

/* ── Badges ── */
.badge{font:600 13px/1 'IBM Plex Mono',monospace;padding:4px 10px;border-radius:5px;letter-spacing:.04em;}
.b-buy{background:var(--gr-dim);color:var(--gr);border:1px solid rgba(57,217,138,.25);}
.b-sell{background:var(--rd-dim);color:var(--rd);border:1px solid rgba(240,101,122,.25);}
.b-hold{background:var(--am-dim);color:var(--am);border:1px solid rgba(245,166,35,.25);}
.b-danger{background:var(--rd-dim);color:var(--rd);border:1px solid rgba(240,101,122,.4);animation:pulse .9s ease-in-out infinite alternate;}
@keyframes pulse{from{opacity:.55}to{opacity:1}}
.g{color:var(--gr);}.r{color:var(--rd);}.a{color:var(--am);}.dim{color:var(--tx3);}

/* ── Reco / boxes ── */
.reco{font:400 13px/1.7 'IBM Plex Mono',monospace;color:var(--tx);background:var(--sur2);border-radius:7px;padding:.55rem .75rem;margin-top:.5rem;}
.alert-box{margin-top:.5rem;font:400 12px/1.5 'IBM Plex Mono',monospace;color:var(--rd);background:var(--rd-dim);border-radius:6px;padding:.4rem .6rem;border:1px solid rgba(240,101,122,.2);}
.warn-box{margin-top:.5rem;font:400 12px/1.5 'IBM Plex Mono',monospace;color:var(--am);background:var(--am-dim);border-radius:6px;padding:.4rem .6rem;border:1px solid rgba(245,166,35,.2);}
.info-box{font:400 11px/1.6 'IBM Plex Mono',monospace;color:var(--tx3);padding:.45rem .65rem;border-radius:6px;background:var(--sur2);border-left:2px solid var(--ac);margin-top:.5rem;}
.tr-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:.5rem;}
.tr-badge{font:500 11px/1 'IBM Plex Mono',monospace;padding:3px 8px;border-radius:4px;background:var(--ac-dim);color:var(--ac2);border:1px solid rgba(124,109,250,.2);}
.safety-note{font:400 11px/1.6 'IBM Plex Mono',monospace;color:var(--tx3);padding:.5rem .8rem;border-radius:7px;background:var(--sur2);border-left:2px solid var(--ac);margin-bottom:.8rem;}

/* ── Summary card ── */
.sum-card{background:var(--sur);border:1px solid var(--brd);border-radius:11px;padding:.85rem 1rem;margin-bottom:.9rem;}
.sum-row{display:flex;align-items:center;justify-content:space-between;gap:.5rem;font:400 12px/1.7 'Space Grotesk',sans-serif;flex-wrap:wrap;}

/* ── Radar ── */
.radar-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:7px;margin-bottom:.6rem;}
.radar-item{background:var(--sur2);border-radius:9px;padding:.65rem .75rem;}
.radar-item-lbl{font:600 13px/1 'Space Grotesk',sans-serif;margin-bottom:.3rem;}
.radar-item-vol{font:600 13px/1 'IBM Plex Mono',monospace;margin-bottom:.2rem;}
.radar-item-sub{font:400 11px/1 'IBM Plex Mono',monospace;color:var(--tx3);}

/* ── Prediction ── */
.pred-card{background:var(--sur);border:1px solid var(--brd);border-radius:11px;padding:.85rem 1rem;margin-bottom:.8rem;}
.pred-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;gap:.5rem;flex-wrap:wrap;}
.pred-title{font:700 13px/1 'Space Grotesk',sans-serif;}
.pred-horizons{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.65rem;}
.pred-h{background:var(--sur2);border-radius:7px;padding:.4rem .55rem;text-align:center;}
.pred-h-lbl{font:400 10px/1 'IBM Plex Mono',monospace;color:var(--tx3);margin-bottom:4px;}
.pred-h-val{font:600 13px/1 'IBM Plex Mono',monospace;}
.pred-concl{font:400 13px/1.7 'IBM Plex Mono',monospace;color:var(--tx);background:var(--sur2);border-radius:7px;padding:.55rem .75rem;margin-bottom:.45rem;}
.pred-concl b{color:var(--ac2);}
.pred-grid{display:block;}

/* ── News ── */
.news-item{border-left:2px solid var(--brd2);padding:.4rem .7rem;margin-bottom:.35rem;border-radius:0 6px 6px 0;display:block;transition:opacity .15s;}
.news-item:hover{opacity:.8;}
.news-item.bull{border-left-color:var(--gr);background:rgba(57,217,138,.03);}
.news-item.bear{border-left-color:var(--rd);background:rgba(240,101,122,.03);}
.news-item.neutral{border-left-color:var(--am);}
.news-title{font:500 13px/1.4 'Space Grotesk',sans-serif;color:var(--tx);margin-bottom:2px;}
.news-sum{font:400 12px/1.5 'IBM Plex Mono',monospace;color:var(--tx2);margin-bottom:3px;}
.news-meta{font:400 11px/1 'IBM Plex Mono',monospace;color:var(--tx3);display:flex;gap:6px;}
.news-link{color:var(--ac2);}

/* ── Sent bar ── */
.sent-bar-wrap{background:var(--sur);border:1px solid var(--brd);border-radius:11px;padding:.85rem 1rem;margin-bottom:.9rem;}
.sent-bar-title{font:700 13px/1 'Space Grotesk',sans-serif;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between;}
.sent-bar-track{height:7px;background:var(--sur3);border-radius:4px;overflow:hidden;margin-bottom:.35rem;}
.sent-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.sent-bar-labels{display:flex;justify-content:space-between;font:400 10px/1 'IBM Plex Mono',monospace;color:var(--tx3);}
.sent-stats{display:flex;gap:.8rem;margin-top:.45rem;font:400 12px/1 'IBM Plex Mono',monospace;color:var(--tx2);flex-wrap:wrap;}

/* ── Footer ── */
.footer{padding:.7rem 1.2rem;border-top:1px solid var(--brd);font:400 11px/1.7 'IBM Plex Mono',monospace;color:var(--tx3);}

/* ── Mobile ── */
/* ── Bottom nav refresh item ── */
.bn-refresh{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
}
.bn-refresh select{
  background:transparent;border:none;color:var(--tx3);
  font:600 10px/1 'IBM Plex Mono',monospace;cursor:pointer;
  width:52px;text-align:center;-webkit-appearance:none;appearance:none;
}
.bn-refresh span{font:500 11px/1 'Space Grotesk',sans-serif;color:var(--tx3);}

/* ── Top nav (mobile only) ── */
.top-nav{
  display:none;
  background:var(--bg2);border-bottom:1px solid var(--brd);
  position:sticky;top:var(--topbar-h,48px);z-index:49;
  height:52px;
}
.bn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;transition:color .15s;color:var(--tx3);
  font:500 11px/1 'Space Grotesk',sans-serif;border:none;background:none;padding:0;
  border-bottom:2px solid transparent;
}
.bn-item.active{color:var(--ac2);border-bottom-color:var(--ac);}
.bn-item:active{opacity:.7;}
.bn-icon{font-size:18px;line-height:1;}

@media(max-width:680px){
  .main{padding-bottom:0;}
  .topbar-time{display:none;}
  .topbar-status{display:none;}
  .topbar-refresh{display:none;}
  .tb-nav-item{display:none;}
  .topbar-sep{display:none;}
  .btn-analyze .btn-label{display:none;}
  .btn-analyze{padding:.45rem .7rem;}
  .mc-hor{display:none;}
  .spark-hdr,.spark-row{grid-template-columns:1fr 44px 44px 44px 60px;}
  .pred-horizons{grid-template-columns:1fr;}
  .top-nav{display:flex;}
  .footer{display:none;}
}
@media(max-width:420px){
  .fg-widget{grid-template-columns:1fr;justify-items:center;text-align:center;}
}
</style>
</head>
<body>
<div class="app">
  <!-- MAIN (sidebar supprimée, nav dans topbar) -->
  <div class="main" style="margin-left:0;">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-brand">Signal Marchés <span id="ver-label" style="font:400 11px/1 'IBM Plex Mono',monospace;color:var(--tx3);">v3.2</span></span>
        <span class="topbar-sep">·</span>
        <button class="tb-nav-item active" id="tb-global" onclick="gotoPage('global')">🌐 Marchés</button>
        <button class="tb-nav-item" id="tb-prediction" onclick="gotoPage('prediction')">🔮 Prédiction</button>
      </div>
      <div class="topbar-right">
        <span class="topbar-dot-wrap"><span class="sb-dot" id="live-dot"></span><span class="sb-stxt topbar-status" id="live-txt">En attente…</span></span>
        <span class="topbar-time" id="last-update"></span>
        <select class="topbar-refresh" id="refresh-select" onchange="syncRefresh(+this.value)">
          <option value="0">↻ OFF</option>
          <option value="300">↻ 5 min</option>
          <option value="900">↻ 15 min</option>
          <option value="1800">↻ 30 min</option>
        </select>
        <button class="btn-analyze" id="btn" onclick="analyserTout()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <span class="btn-label">Analyser</span>
        </button>
      </div>
    </div>

    <!-- TOP NAV (mobile seulement) -->
    <nav class="top-nav" id="top-nav">
      <button class="bn-item active" id="bn-global" onclick="gotoPageMobile('global')">
        <span class="bn-icon">🌐</span>
        <span>Marchés</span>
      </button>
      <button class="bn-item" id="bn-prediction" onclick="gotoPageMobile('prediction')">
        <span class="bn-icon">🔮</span>
        <span>Prédiction</span>
      </button>
      <div class="bn-refresh">
        <select id="refresh-select-mobile" onchange="syncRefresh(+this.value)">
          <option value="0">↻ OFF</option>
          <option value="300">5 min</option>
          <option value="900">15 min</option>
          <option value="1800">30 min</option>
        </select>
        <span>Refresh</span>
      </div>
    </nav>

    <div class="content">
      <!-- PAGE: GLOBAL -->
      <div class="page active" id="page-global"><div class="page-inner">
        <div class="ldr-wrap" id="ldr" style="display:none;">
          <div class="ldr-bar"><div class="ldr-fill" id="lf"></div></div>
          <div class="ldr-txt" id="lt">Initialisation…</div>
        </div>
        <div id="sec-global"></div>
      </div></div>
      <!-- PAGE: PREDICTION -->
      <div class="page" id="page-prediction"><div class="page-inner">
        <div id="sec-prediction"><div style="font:400 13px/1.5 'IBM Plex Mono',monospace;color:var(--tx3);padding:2rem;text-align:center;">Lancez une analyse pour voir les prédictions.</div></div>
      </div></div>
    </div>

    <div class="footer">
      ⚠ Informatif uniquement — pas un conseil en investissement. Risque très élevé sur produits à levier.<br>
      Sources : Finnhub · Binance · CoinGecko · Newsdata.io · MyMemory
    </div>
  </div><!-- /main -->
</div>

<script>
const FH=[100,56,50,112,100,113,112,114,48,49,113,118,107,101,118,110,100,98,55,103,100,56,50,112,100,113,112,114,48,49,113,118,107,101,118,110,100,98,56,48].map(c=>String.fromCharCode(c)).join('');
const DATA={};
let _autoTimer=null,_signals=null,_NEWS=[];

/* ── Utils ── */
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
function fetchT(url,ms=8000){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);return fetch(url,{signal:c.signal}).finally(()=>clearTimeout(t));}
function fhUrl(p){return`https://finnhub.io/api/v1${p}${p.includes('?')?'&':'?'}token=${FH}&_t=${Date.now()}`;}

// Set --topbar-h CSS var for top-nav sticky offset
function setTopbarHeight(){
  const h=document.querySelector('.topbar')?.offsetHeight||48;
  document.documentElement.style.setProperty('--topbar-h',h+'px');
}
window.addEventListener('load',setTopbarHeight);
window.addEventListener('resize',setTopbarHeight);
function sigCls(h){return h>=60?'g':h<=42?'r':'a';}
function badgeCls(s){return s==='ACHAT'?'b-buy':s==='VENTE'?'b-sell':s==='DANGER'?'b-danger':'b-hold';}
function pctCls(p){if(p==null)return'dim';const v=+p;return isNaN(v)?'dim':v>0.3?'g':v<-0.3?'r':'dim';}
function fmtPct(p){if(p==null)return'—';const v=+p;return isNaN(v)?'—':(v>=0?'+':'')+v.toFixed(2)+'%';}
function fmtScore(h){return Math.round(h);}
function fmtPrice(price,key){
  if(price==null)return'—';
  const isCrypto=['BTC','ETH','SOL','XRP'].includes(key);

let _isRunning=false;
function setAutoRefresh(secs){
  if(_autoTimer){clearInterval(_autoTimer);_autoTimer=null;}
  if(secs>0){
    // Avertir si le quota sera dépassé
    const analysesParJour=Math.floor(86400/secs);
    const reqParJour=analysesParJour*6;
    if(reqParJour>96){
      const minSafe=Math.ceil(86400/16/60);
      console.warn(`Auto-refresh ${secs}s = ${analysesParJour} analyses/jour = ${reqParJour} req Newsdata. Quota dépassé. Min conseillé : ${minSafe} min.`);
    }
    _autoTimer=setInterval(async()=>{
      if(_isRunning)return; // anti-empilement
      await analyserTout();
    },secs*1000);
  }
}

function pushAndGet(h,k,price,prevClose){
  if(!price||isNaN(+price))return(h[k]||[]).map(e=>e.c);
  if(!h[k])h[k]=[];
  if(!h[k].length&&prevClose&&!isNaN(+prevClose)){
    const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
    h[k].push({d:yest,c:+prevClose});
  }
  const today=new Date().toISOString().slice(0,10);
  if(!h[k].length||h[k].at(-1).d!==today)h[k].push({d:today,c:+price});
  if(h[k].length>60)h[k]=h[k].slice(-60);
  return h[k].map(e=>e.c);
}

// Merge candle data into local history (fills gaps, keeps manual points)
function mergeCandles(h,k,candles){
  if(!candles?.length)return;
  if(!h[k])h[k]=[];
  const existing=new Set(h[k].map(e=>e.d));
  const toAdd=candles.filter(c=>!existing.has(c.d)&&c.c>0);
  h[k]=[...h[k],...toAdd].sort((a,b)=>a.d.localeCompare(b.d));
  if(h[k].length>60)h[k]=h[k].slice(-60);
}

// Fetch 60 days of daily candles from Finnhub — only if cache is stale
async function fetchCandles(fhSym,localKey,h,meta){
  const today=new Date().toISOString().slice(0,10);
  const nPoints=h[localKey]?.length||0;
  const lastFetch=meta[localKey]||'';
  // Skip if already fetched today AND we have ≥30 points
  if(lastFetch===today&&nPoints>=30)return;
  try{
    const to=Math.floor(Date.now()/1000);
    const from=to-60*86400;
    const r=await fetchT(fhUrl(`/stock/candle?symbol=${fhSym}&resolution=D&from=${from}&to=${to}`),8000);
    if(!r.ok)return;
    const d=await r.json();
    if(d.s!=='ok'||!d.t?.length)return;
    const candles=d.t.map((ts,i)=>({
      d:new Date(ts*1000).toISOString().slice(0,10),
      c:d.c[i],
    }));
    mergeCandles(h,localKey,candles);
    meta[localKey]=today;
  }catch{}
}

async function fetchCryptoCandles(binanceSym,localKey,h,meta){

async function fetchStocks(h,meta){
  const keys=Object.keys(STOCKS_FH);
  // 1. Fetch quotes (fast, parallel)
  await Promise.allSettled(keys.map(async k=>{
    const{fh,label}=STOCKS_FH[k];
    const q=await fhQuote(fh);
    DATA[k]=q
      ?{label,price:q.price,prev:q.prev,pct:q.pct,ok:true,closes:[],source:'Finnhub'}
      :{label,price:null,prev:null,pct:null,ok:false,closes:[],source:'Finnhub'};
  }));
  // 2. Fetch candles for main (non-radar) symbols — batched to avoid rate limit
  const mainKeys=keys.filter(k=>!STOCKS_FH[k].radar);
  const radarKeys=keys.filter(k=>STOCKS_FH[k].radar);
  // Main symbols first (they matter most for signals)
  await Promise.allSettled(mainKeys.map(k=>fetchCandles(STOCKS_FH[k].fh,k,h,meta)));
  // Radar: only fetch if stale, sequentially to stay within rate limit
  for(const k of radarKeys){
    await fetchCandles(STOCKS_FH[k].fh,k,h,meta);
  }
  // 3. Push today's quote into history and get closes array
  keys.forEach(k=>{DATA[k].closes=pushAndGet(h,k,DATA[k].price,DATA[k].prev);});
}

async function traduire(txt){

async function traduireNews(news){
  const out=[];
  const enNews=news.filter(n=>n.lang==='en');
  const frNews=news.filter(n=>n.lang==='fr');
  // FR news : pas de traduction, juste formater
  frNews.forEach(n=>out.push({...n,resume:n.detail}));
  // EN news : traduire par batch
  for(let i=0;i<enNews.length;i+=5){
    const batch=enNews.slice(i,i+5);
    const res=await Promise.allSettled(batch.map(async n=>({
      ...n,
      titre:await traduire(n.titre),
      resume:n.detail?await traduire(n.detail):'',
    })));
    res.forEach((r,j)=>out.push(r.status==='fulfilled'?r.value:{...batch[j],resume:''}));
    if(i+5<enNews.length)await new Promise(r=>setTimeout(r,350));
  }
  // Re-trier : FR en premier, puis EN traduit
  return out.sort((a,b)=>(a.lang==='fr'?0:1)-(b.lang==='fr'?0:1));
}

/* ── Indicators ── */
function rsi14(c,n=14){
  if(!c||c.length<n+1)return null;
  let g=0,l=0;
  for(let i=1;i<=n;i++){const d=c[i]-c[i-1];d>0?g+=d:l-=d;}
  let ag=g/n,al=l/n;
  for(let i=n+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(n-1)+(d>0?d:0))/n;al=(al*(n-1)+(d<0?-d:0))/n;}
  return al===0?100:100-100/(1+ag/al);
}
function sma(c,n){if(!c||c.length<n)return null;return c.slice(-n).reduce((a,b)=>a+b,0)/n;}
function volatilite(closes,n=10){
  if(!closes||closes.length<n+1)return null;
  const ret=[];
  for(let i=closes.length-n;i<closes.length;i++){if(closes[i-1])ret.push((closes[i]-closes[i-1])/closes[i-1]*100);}
  if(!ret.length)return null;
  const mean=ret.reduce((a,b)=>a+b,0)/ret.length;
  return Math.sqrt(ret.reduce((a,b)=>a+(b-mean)**2,0)/ret.length);
}

function scoreAsset(d){
  if(!d?.ok||d.pct==null)return{score:50,alerts:[],warnings:[],blocked:false};
  const c=d.closes||[];const rsi=d.rsi||null;const p1=d.pct;
  const p5=d._p5!=null?d._p5:(c.length>=6?((c.at(-1)-c.at(-6))/c.at(-6))*100:null);
  const p20=d._p20!=null?d._p20:(c.length>=21?((c.at(-1)-c.at(-21))/c.at(-21))*100:null);
  const vol=d._vol!=null?d._vol:volatilite(c);
  const sma5v=sma(c,5),sma20v=sma(c,20);
  const alerts=[],warnings=[];let blocked=false;
  if(vol!=null&&vol>4){blocked=true;alerts.push(`🚨 Volatilité ${vol.toFixed(1)}%/j — signal neutralisé`);}
  if(p5!=null&&p5<-8){blocked=true;alerts.push(`🚨 Chute 5j : ${p5.toFixed(1)}% — signal VENTE forcé`);}
  if(rsi!=null&&rsi>75){blocked=true;alerts.push(`🚨 RSI ${rsi.toFixed(0)} — surachat extrême`);}
  if(p1<-5)alerts.push(`⚠ Chute du jour : ${p1.toFixed(1)}%`);
  if(p5!=null&&p5<-15)alerts.push(`🚨 Krach 5j : ${p5.toFixed(1)}%`);
  let bull=0,bear=0;
  if(p1>3)bull+=4;else if(p1>1)bull+=2;else if(p1>0)bull+=1;else if(p1<-3)bear+=4;else if(p1<-1)bear+=2;else if(p1<0)bear+=1;
  if(p5!=null){if(p5>8)bull+=6;else if(p5>4)bull+=4;else if(p5>2)bull+=2;else if(p5>0)bull+=1;else if(p5<-8)bear+=6;else if(p5<-4)bear+=4;else if(p5<-2)bear+=2;else if(p5<0)bear+=1;}
  if(p20!=null){if(p20>15)bull+=4;else if(p20>8)bull+=2;else if(p20>0)bull+=1;else if(p20<-15)bear+=4;else if(p20<-8)bear+=2;else if(p20<0)bear+=1;}
  if(rsi!=null){if(rsi>70)bear+=6;else if(rsi>60)bear+=2;else if(rsi>55)bull+=1;else if(rsi<30)bull+=3;else if(rsi<40)bull+=1;else if(rsi<45)bear+=1;}
  if(vol!=null&&vol>2.5&&vol<=4){bear+=3;warnings.push(`Vol. élevée ${vol.toFixed(1)}%/j`);}
  if(sma5v&&sma20v){if(sma5v>sma20v*1.01)bull+=2;else if(sma5v<sma20v*0.99)bear+=2;}
  if(c.length>=20&&sma20v){if(c.at(-1)>sma20v*1.02)bull+=1;else if(c.at(-1)<sma20v*0.98)bear+=2;}
  const total=bull+bear||1;let score=cl(30+(bull/total)*65,3,97);
  if(blocked){if(p5!=null&&p5<-8)score=cl(score,3,38);else score=cl(score,3,48);}
  return{score,alerts,warnings,blocked};
}

function computeSignal(keys){
  let totalBull=0,totalBear=0,n=0,nbBlocked=0;
  const allAlerts=[],allWarnings=[];
  keys.forEach(k=>{
    const d=DATA[k];if(!d?.ok||d.pct==null)return;n++;
    const{score,alerts,warnings,blocked}=scoreAsset(d);
    alerts.forEach(a=>allAlerts.push({label:d.label,msg:a}));
    warnings.forEach(w=>allWarnings.push(`${d.label} : ${w}`));
    if(blocked)nbBlocked++;
    const contrib=score-50;if(contrib>0)totalBull+=contrib;else totalBear+=Math.abs(contrib);
  });
  if(n===0)return{H:50,B:50,sig:'NEUTRE',conf:'Faible',n:0,alerts:[],warnings:[],nbBlocked:0};
  const total=totalBull+totalBear||1;let H=cl(35+(totalBull/total)*60,5,95);
  const r=nbBlocked/n;if(r>=0.5)H=cl(H,5,50);if(r>=0.75)H=cl(H,5,42);
  const nbCrit=allAlerts.filter(a=>a.msg.startsWith('🚨')).length;
  const rawSig=H>=60?'ACHAT':H<=42?'VENTE':'NEUTRE';
  const sig=nbCrit>=2?'DANGER':rawSig;
  const conf=n>=3?(Math.abs(H-50)>12?'Élevée':'Modérée'):'Faible';
  return{H,B:cl(100-H,5,95),sig,conf,n,alerts:allAlerts.slice(0,4),warnings:allWarnings.slice(0,3),nbBlocked};
}

function computeRadarVolatilite(){

    return{key:k,label:d.label,pct:d.pct,vol:d._vol,p5:d._p5,score,sig:nbCrit>=1?'DANGER':sig,alerts};
  }).filter(Boolean).sort((a,b)=>(b.vol||0)-(a.vol||0)).slice(0,4);
}

function sentimentNews(n){
  const t=(n.headline+' '+(n.summary||'')).toLowerCase();
  const bull=['surge','rally','gain','rise','beat','jump','record','strong','higher','growth','bullish','soar','upgrade','profit','boost'];
  const bear=['fall','drop','loss','miss','decline','weak','lower','cut','warn','bearish','crash','plunge','downgrade','concern','risk'];
  return bull.filter(w=>t.includes(w)).length>bear.filter(w=>t.includes(w)).length?'bull':
         bear.filter(w=>t.includes(w)).length>bull.filter(w=>t.includes(w)).length?'bear':'neutral';
}

  const utc=Date.now()+new Date().getTimezoneOffset()*60000;
  const ny=new Date(utc-4*3600000),fr=new Date(utc+2*3600000);
  const nyH=ny.getHours()+ny.getMinutes()/60,nyD=ny.getDay();
  const frH=fr.getHours()+fr.getMinutes()/60,frD=fr.getDay();
  return{
    semi:nyD>=1&&nyD<=5&&nyH>=9.5&&nyH<16,
    nasdaq:nyD>=1&&nyD<=5&&nyH>=9.5&&nyH<16,
    europe:frD>=1&&frD<=5&&frH>=9&&frH<17.5,
    petrole:nyD>=1&&nyD<=5||(nyD===0&&nyH>=18),
    or:nyD>=1&&nyD<=5,
    crypto:true
  };
}

function sparklineSVG(closes){
  if(!closes||closes.length<2)return`<svg class="spark-svg" viewBox="0 0 70 24"><line x1="0" y1="12" x2="70" y2="12" stroke="#252540" stroke-width="1"/></svg>`;
  const min=Math.min(...closes),max=Math.max(...closes),range=max-min||1;
  const pts=closes.map((v,i)=>{const x=(i/(closes.length-1))*68+1;const y=22-((v-min)/range)*20+1;return`${x},${y}`;});
  const c=closes.at(-1)>=closes[0]?'#39d98a':'#f0657a';
  return`<svg class="spark-svg" viewBox="0 0 70 24" preserveAspectRatio="none"><polyline fill="none" stroke="${c}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" points="${pts.join(' ')}"/></svg>`;
}

function computeFG(signals){
  const keys=['semi','nasdaq','europe','petrole','or','crypto'];
  const scores=keys.map(k=>signals[k]?.H||50);
  return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
}

function fgGaugeHTML(val){
  const c=val>=60?'var(--gr)':val<=40?'var(--rd)':'var(--am)';
  const lbl=val>=80?'Avidité extrême':val>=60?'Avidité':val>=45?'Neutre':val>=30?'Peur':'Peur extrême';
  const circ=Math.PI*28;
  const dash=(circ*(val/100)).toFixed(1);
  return`<div class="fg-widget">
    <div class="fg-gauge">
      <svg viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
        <path d="M 12 42 A 28 28 0 0 1 68 42" fill="none" stroke="#252540" stroke-width="7" stroke-linecap="round"/>
        <path d="M 12 42 A 28 28 0 0 1 68 42" fill="none" stroke="${c}" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="${dash} ${circ.toFixed(1)}" style="transition:stroke-dasharray .8s ease;"/>
        <text x="40" y="43" text-anchor="middle" dominant-baseline="middle" fill="${c}" font-family="IBM Plex Mono" font-weight="700" font-size="14">${val}</text>
      </svg>
    </div>
    <div>
      <div class="fg-label" style="color:${c};">${lbl}</div>
      <div class="fg-desc">Indice Fear &amp; Greed synthétique — calculé à partir des scores de signal sur l'ensemble des marchés couverts.</div>
    </div>
  </div>`;
}

/* ── Vedette ── */
function choisirVedette(MKTS,signals){
  const MH=MKTS.filter(m=>!m.isRadar);
  const cands=[...MH].filter(m=>signals[m.key].sig==='ACHAT'||signals[m.key].sig==='NEUTRE')
    .sort((a,b)=>signals[b.key].H-signals[a.key].H);
  const vedette=cands.find(m=>signals[m.key].sig==='ACHAT')||cands[0]||MH[0];
  const s=signals[vedette.key];
  const actifs=vedette.keys.filter(k=>DATA[k]?.ok);
  const raisons=[];
  const rsiSains=actifs.filter(k=>DATA[k]?.rsi&&DATA[k].rsi>45&&DATA[k].rsi<65);
  if(rsiSains.length)raisons.push(`RSI sain (${rsiSains.length}/${actifs.length})`);
  const h5=actifs.filter(k=>DATA[k]?._p5>2);if(h5.length)raisons.push(`Tendance 5j ↑ (${h5.length})`);
  const vf=actifs.filter(k=>DATA[k]?._vol!=null&&DATA[k]._vol<2);if(vf.length)raisons.push('Faible volatilité');
  const hj=actifs.filter(k=>DATA[k]?.pct>0.5);if(hj.length)raisons.push(`Hausse du jour (${hj.length})`);
  if(s.H>=65)raisons.push(`Score fort : ${fmtScore(s.H)}/100`);
  if(s.nbBlocked===0)raisons.push('Aucun filtre actif');
  const miniActifs=vedette.keys.slice(0,4).map(k=>{
    const d=DATA[k];if(!d?.ok)return'';
    return`<span class="vedette-actif ${pctCls(d.pct)}">${d.label} ${fmtPct(d.pct)}</span>`;
  }).join('');
  return{vedette,s,raisons,miniActifs};
}

async function analyserTout(){
  if(_isRunning)return;

  try{
    const h=loadHist(),meta=loadMeta();

    await step(5,'Quotes temps réel…');
    const useND=canFetchND();
    const [rawNews]=await Promise.all([
      fetchNews(useND).catch(()=>[]),
      fetchStocks(h,meta).catch(()=>{}),
      fetchCrypto().catch(()=>{}),
    ]);

    await step(55,'Historique 60j — crypto…');
    const cryptoPairs={BTC:'BTCUSDT',ETH:'ETHUSDT',SOL:'SOLUSDT',XRP:'XRPUSDT'};
    await Promise.allSettled(
      Object.entries(cryptoPairs).map(([k,sym])=>fetchCryptoCandles(sym,k,h,meta))
    );

    // Push today's quote into history for crypto
    ['BTC','ETH','SOL','XRP'].forEach(k=>{
      if(DATA[k]?.ok&&DATA[k].price)DATA[k].closes=pushAndGet(h,k,DATA[k].price,DATA[k].prev);
    });
    saveHist(h);
    saveMeta(meta);

    // Compute indicators
    await step(72,'RSI · 5j · 20j · volatilité…');
    Object.keys(DATA).forEach(k=>{
      const d=DATA[k];if(!d?.closes?.length)return;
      if(d.closes.length>14)d.rsi=rsi14(d.closes);
      if(d.closes.length>=6)d._p5=((d.closes.at(-1)-d.closes.at(-6))/d.closes.at(-6))*100;
      if(d.closes.length>=21)d._p20=((d.closes.at(-1)-d.closes.at(-21))/d.closes.at(-21))*100;
      if(d.closes.length>=11)d._vol=volatilite(d.closes);
    });

    await step(75,'Actualités FR + traduction EN…');
    if(useND)incrementQuota(6);
    const NEWS=rawNews?.length>0?await traduireNews(rawNews).catch(()=>rawNews):[];
    _NEWS=NEWS;

    await step(93,'Calcul des signaux…');
    const ms=getMarketStatus();
    const signals={
      semi:computeSignal(['NVDA','AMD','TSM','AVGO','ASML']),
      nasdaq:computeSignal(['QQQ','MSFT','AAPL','META','GOOG']),
      europe:computeSignal(['TTE.PA','AIR.PA','LVMH.PA','SAN.PA','BNP.PA','OR.PA']),

      or:computeSignal(['GLD','SLV','GDX']),
      crypto:computeSignal(['BTC','ETH','SOL','XRP']),
      radar:computeRadarVolatilite(),
    };
    _signals=signals;
    await step(100,'Prêt.');
    ldr.style.display='none';btn.disabled=false;_isRunning=false;
    document.getElementById('last-update').textContent='Mis à jour : '+nowStr();
    // Incrémenter la version à chaque analyse
    const verEl=document.getElementById('ver-label');
    if(verEl){
      const cur=verEl.textContent.match(/v(\d+)\.(\d+)/);
      if(cur)verEl.textContent=`v${cur[1]}.${+cur[2]+1}`;
    }
    liveDot.className='sb-dot live';liveTxt.textContent='Mis à jour '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    renderGlobal(signals,NEWS,ms);

  }catch(e){

    document.getElementById('sec-global').innerHTML=`<div class="alert-box">⚠ Erreur : ${e.message}<br>Vérifiez votre connexion.</div>`;

/* ── Toggle card — scroll only if card top hidden behind topbar ── */
function toggleMC(key){
  const mc=document.getElementById('mc-'+key);if(!mc)return;
  const isOpen=mc.classList.contains('open');
  document.querySelectorAll('.mc.open').forEach(el=>el.classList.remove('open'));
  if(!isOpen){
    mc.classList.add('open');
    setTimeout(()=>{
      const rect=mc.getBoundingClientRect();
      const topbarH=(document.querySelector('.topbar')?.offsetHeight||48)
                   +(document.querySelector('.top-nav')?.offsetHeight||0);
      const margin=10;
      if(rect.top<topbarH+margin){
        window.scrollTo({top:window.scrollY+rect.top-topbarH-margin,behavior:'smooth'});
      } else if(rect.bottom>window.innerHeight-margin){
        const scrollNeeded=rect.bottom-(window.innerHeight-margin);
        const maxScroll=rect.top-topbarH-margin;
        window.scrollTo({top:window.scrollY+Math.min(scrollNeeded,maxScroll),behavior:'smooth'});
      }
    },360);
  }
}

    nasdaq:"Surveiller le dollar US — Nasdaq hedgé EUR recommandé.",
    europe:'BCE à 2%, inflation en baisse. Airbus et TotalEnergies = valeurs phares.',
    petrole:'Géopolitique Iran/Ormuz = volatilité. Surveiller OPEC.',
    or:'Refuge en tensions. Corrélation inverse dollar.',
    crypto:'Corrèle avec le Nasdaq. Volatilité ×3 vs actions.',
  };
  const MKTS_P=[
    {key:'semi',icon:'🔬',label:'Semi-conducteurs'},
    {key:'nasdaq',icon:'📈',label:'Nasdaq 100'},
    {key:'europe',icon:'🇪🇺',label:'Bourse Européenne'},
    {key:'petrole',icon:'🛢️',label:'Pétrole & Énergie'},
    {key:'or',icon:'🥇',label:'Or & Métaux'},
    {key:'crypto',icon:'₿',label:'Crypto'},
  ];

  const bullN=NEWS.filter(n=>n.impact==='bull'),bearN=NEWS.filter(n=>n.impact==='bear');
  const tot=bullN.length+bearN.length,conf=tot>0?Math.round(bullN.length/tot*100):50;
  const sentCls=conf>=60?'g':conf<=40?'r':'a';
  const sentTxt=conf>=60?'Haussier':conf<=40?'Baissier':'Incertain';
  const sentHTML=`<div class="sent-bar-wrap">
    <div class="sent-bar-title"><span>🗞 Sentiment actualités</span><span class="badge ${badgeCls(sentTxt==='Haussier'?'ACHAT':sentTxt==='Baissier'?'VENTE':'NEUTRE')}">${sentTxt}</span></div>
    <div class="sent-bar-track"><div class="sent-bar-fill" style="width:${conf}%;background:${conf>=60?'var(--gr)':conf<=40?'var(--rd)':'var(--am)'};"></div></div>
    <div class="sent-bar-labels"><span class="r">Baissier</span><span class="${sentCls}">${conf}%</span><span class="g">Haussier</span></div>
    <div class="sent-stats"><span>${bullN.length} haussières</span><span>${bearN.length} baissières</span><span>${NEWS.length-bullN.length-bearN.length} neutres</span><span>${NEWS.length} actualités</span></div>
  </div>`;

  const cards=MKTS_P.map(m=>{
    const s=signals[m.key];
    const mn=NEWS.filter(n=>mktKw[m.key].test(n.titre+(n.resume||n.detail||'')));
    const mb=mn.filter(n=>n.impact==='bull').length,mr=mn.filter(n=>n.impact==='bear').length;
    const ni=mb>mr?'bull':mr>mb?'bear':'neutral';
    const isDanger=s.sig==='DANGER',isVente=s.sig==='VENTE';
    const niEff=(isDanger||isVente)&&ni==='bull'?'neutral':ni;
    const niTxt=niEff==='bull'?'haussier':niEff==='bear'?'baissier':'prudent';
    const niIcon=niEff==='bull'?'🟢':niEff==='bear'?'🔴':'🟡';
    let fH=mn.length>0?Math.round(s.H*0.65+(ni==='bull'?72:ni==='bear'?28:50)*0.35):s.H;
    if(isDanger||isVente)fH=Math.min(fH,45);
    const fsSafe=isDanger?'DANGER':fH>=60?'ACHAT':fH<=42?'VENTE':'NEUTRE';
    let est24h,est1sem,estCls;
    if(isDanger){est24h='imprédictible';est1sem='imprédictible';estCls='a';}
    else if(isVente||fsSafe==='VENTE'){est24h='de -1% à -4%';est1sem='de -2% à -8%';estCls='r';}
    else if(fsSafe==='ACHAT'){const amp=fH>=70?4:2;est24h=`de 0% à +${amp}%`;est1sem=`de +1% à +${amp*2}%`;estCls='g';}
    else{est24h='de -1% à +1%';est1sem='de -2% à +2%';estCls='dim';}
    const action=fsSafe==='ACHAT'?'<b>→ Conditions favorables.</b>':fsSafe==='DANGER'?'<b>→ 🚨 Ne pas intervenir.</b>':fsSafe==='VENTE'?'<b>→ Pression vendeuse confirmée.</b>':'<b>→ Attendre confirmation.</b>';
    const concl=mn.length===0
      ?`Pas d'actualité spécifique. Signal : <b>${s.sig}</b> (${fmtScore(s.H)}/100). ${mktCtx[m.key]}`
      :`${mn.length} actu(s) — sentiment ${niIcon} <b>${niTxt}</b>. « ${mn[0].titre} ». ${mktCtx[m.key]} ${action}`;
    const alertHTML=s.alerts?.length?`<div class="alert-box" style="margin-bottom:.4rem;">${s.alerts.map(a=>`⚠ <b>${a.label}</b> : ${a.msg}`).join('<br>')}</div>`:'';
    const newsHTML=mn.slice(0,2).map(n=>`<a class="news-item ${n.impact}" href="${n.url||'#'}" target="_blank" rel="noopener noreferrer">
      <div class="news-title">${n.titre}</div>
      ${n.resume?`<div class="news-sum">${n.resume}</div>`:''}
      <div class="news-meta"><span>${n.source||''}</span>${n.time?`<span>· ${n.time}</span>`:''}${n.url?`<span class="news-link">↗</span>`:''}</div>
    </a>`).join('');
    return`<div class="pred-card">
      <div class="pred-head">
        <span class="pred-title">${m.icon} ${m.label}</span>
        <span class="badge ${badgeCls(fsSafe)}" style="font-size:10px;padding:3px 8px;">${fsSafe}</span>
      </div>
      <div class="pred-horizons">
        <div class="pred-h"><div class="pred-h-lbl">Signal</div><div class="pred-h-val ${sigCls(s.H)}">${s.sig} ${fmtScore(s.H)}</div></div>
        <div class="pred-h"><div class="pred-h-lbl">Estimation 24h</div><div class="pred-h-val ${estCls}" style="font-size:10px;">${est24h}</div></div>
        <div class="pred-h"><div class="pred-h-lbl">Estimation 1 sem</div><div class="pred-h-val ${estCls}" style="font-size:10px;">${est1sem}</div></div>
      </div>
      <div class="pred-concl">${concl}</div>
      ${alertHTML}${newsHTML}
    </div>`;
  }).join('');

  document.getElementById('sec-prediction').innerHTML=`
    ${sentHTML}
    <div class="pred-grid">${cards}</div>
    <div class="info-box" style="margin-top:.5rem;">⚠ Estimations probabilistes — pas des garanties. Toujours utiliser un stop-loss.</div>
    <button onclick="analyserTout()" style="width:100%;background:var(--sur);border:1px solid var(--brd);color:var(--tx2);border-radius:8px;padding:.6rem;font:600 11px/1 'Space Grotesk',sans-serif;cursor:pointer;margin-top:.8rem;">↻ Rafraîchir</button>`;
}
</script>
</body>
</html>
